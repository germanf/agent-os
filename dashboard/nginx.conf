server {
    listen 80;
    server_name _;

    # Security: only allow WireGuard subnet
    allow 10.0.0.0/24;
    deny  all;

    # Redirect HTTP to HTTPS for security (Task #6: HTTPS enforcement)
    location / {
        # Mirrors the limit in the :443 block below for consistency, even
        # though this block only issues a redirect and never reads the body.
        client_max_body_size 55M;
        return 307 https://$host$request_uri;
    }

    # Exception: allow /.well-known/acme-challenge for Let's Encrypt renewal
    # (Preserved for future HTTPS CA integration, currently using self-signed cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS — needed for the Web Speech API (mic input via SpeechRecognition),
# which most browsers restrict to secure contexts. Self-signed cert generated
# idempotently by start.sh. Port 80 now redirects to 443 (Task #6).
server {
    listen 443 ssl;
    server_name _;

    # Security: only allow WireGuard subnet
    allow 10.0.0.0/24;
    deny  all;

    ssl_certificate     /etc/nginx/ssl/agentic-boutique-selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/agentic-boutique-selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # HSTS header: instructs (compliant) browsers to always use HTTPS for future
    # connections. Note: with self-signed certs, browsers ignore HSTS on cert errors
    # (RFC 6797 sec. 7.4), so this is defense-in-depth but not the sole enforcement.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; media-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        # Default nginx limit is 1MB, which rejects file uploads from /chat
        # (the app validates up to MAX_FILE_SIZE=10MB / MAX_TOTAL_SIZE=50MB
        # in dashboard/main.py) with a raw 413 before FastAPI ever sees the
        # request. 55M leaves headroom above the app's 50MB total so nginx
        # passes the request through and the app's own clear error message
        # is what the user sees (issue #112).
        client_max_body_size 55M;
        proxy_pass         http://127.0.0.1:8765;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # SSE: disable buffering so log lines arrive immediately
        proxy_set_header   Connection        "";
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 600s;
    }
}
